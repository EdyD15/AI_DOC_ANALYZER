server {
    listen 80;
    server_name _;

    # The build's VITE_API_URL points the frontend straight at the backend's
    # own URL (see frontend/src/api.js), so nginx only serves static files —
    # no /api proxy, no upstream hostname to resolve.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
